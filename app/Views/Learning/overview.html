  const moduleNav = document.getElementById('module-nav');
  const moduleContentEl = document.getElementById('module-content');
  let currentModuleId = null;

  function sanitizeHTML(str) {
    const temp = document.createElement('div');
    temp.textContent = str;
    return temp.innerHTML;
  }

  function renderModuleContent(moduleId) {
    const module = modulesData.find(m => m.id === moduleId);
    if (!module) {
      moduleContentEl.innerHTML = `<p class="text-red-500">Module not found.</p>`;
      return;
    }
    currentModuleId = moduleId;

    let tasksHtml = module.tasks.map((task, index) => `
                <li class="py-3 flex items-start border-b border-gray-200 last:border-b-0">
                    <input type="checkbox" id="task-${module.id}-${task.id}" data-module-id="${module.id}" data-task-id="${task.id}" class="task-checkbox h-5 w-5 text-[#0EA5E9] border-gray-300 rounded focus:ring-[#0EA5E9] mr-3 mt-1" ${task.completed ? 'checked' : ''}>
                    <label for="task-${module.id}-${task.id}" class="flex-1 text-gray-700">${sanitizeHTML(task.text)}</label>
                </li>
                ${task.code ? `<li class="pb-3 ml-8 -mt-2"><pre><code class="language-php">${sanitizeHTML(task.code)}</code></pre></li>` : ''}
            `).join('');

    const completedTasks = module.tasks.filter(t => t.completed).length;
    const totalTasks = module.tasks.length;
    const progressText = totalTasks > 0 ? `(${completedTasks}/${totalTasks} tasks completed)` : '';

    moduleContentEl.innerHTML = `
                <div class="bg-white p-6 sm:p-8 rounded-xl shadow-lg border border-gray-200">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-3xl font-bold text-[#36454F]">${sanitizeHTML(module.title)}</h2>
                        <span id="status-${module.id}" class="status-badge ${getModuleStatusClass(module.status)}">${sanitizeHTML(module.status)} ${progressText}</span>
                    </div>

                    <div class="mb-6">
                        <h3 class="text-xl font-semibold text-[#0284C7] mb-2">Goal</h3>
                        <p class="text-gray-700 leading-relaxed">${sanitizeHTML(module.goal)}</p>
                    </div>

                    <div class="mb-6">
                        <h3 class="text-xl font-semibold text-[#0284C7] mb-2">Key Concepts</h3>
                        <ul class="list-disc list-inside text-gray-700 space-y-1 pl-2">
                            ${module.keyConcepts.map(concept => `<li>${sanitizeHTML(concept)}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="mb-6">
                        <h3 class="text-xl font-semibold text-[#0284C7] mb-2">Tasks</h3>
                        <ul class="bg-gray-50 p-4 rounded-lg border border-gray-200">${tasksHtml}</ul>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-[#E0F2FE] p-4 rounded-lg">
                            <h3 class="text-lg font-semibold text-[#0284C7] mb-2">Estimated Time</h3>
                            <p class="text-gray-700">${sanitizeHTML(module.estimatedTime)}</p>
                        </div>
                        <div class="bg-[#E0F2FE] p-4 rounded-lg">
                            <h3 class="text-lg font-semibold text-[#0284C7] mb-2">Self-Check / Milestone</h3>
                            <p class="text-gray-700">${sanitizeHTML(module.selfCheck)}</p>
                        </div>
                    </div>
                </div>
            `;

    document.querySelectorAll('.task-checkbox').forEach(checkbox => {
      checkbox.addEventListener('change', handleTaskChange);
    });
    updateActiveNavItem();
  }

  function handleTaskChange(event) {
    const moduleId = event.target.dataset.moduleId;
    const taskId = event.target.dataset.taskId;
    const module = modulesData.find(m => m.id === moduleId);
    const task = module.tasks.find(t => t.id === taskId);
    task.completed = event.target.checked;
    updateModuleStatus(moduleId);
    updateOverallProgress();
  }

  function updateModuleStatus(moduleId) {
    const module = modulesData.find(m => m.id === moduleId);
    const completedTasks = module.tasks.filter(t => t.completed).length;
    const totalTasks = module.tasks.length;

    if (totalTasks === 0) {
      module.status = "Not Started"; // Or "No tasks"
    } else if (completedTasks === totalTasks) {
      module.status = "Completed!";
    } else if (completedTasks > 0) {
      module.status = "In Progress";
    } else {
      module.status = "Not Started";
    }

    if (currentModuleId === moduleId) {
      const statusEl = document.getElementById(`status-${moduleId}`);
      if (statusEl) {
        const progressText = totalTasks > 0 ? `(${completedTasks}/${totalTasks} tasks completed)` : '';
        statusEl.textContent = `${module.status} ${progressText}`;
        statusEl.className = `status-badge ${getModuleStatusClass(module.status)}`;
      }
    }
    renderModuleNav(); // Re-render nav to update status indicators if any
  }

  function getModuleStatusClass(status) {
    if (status === "Completed!") return 'status-completed';
    if (status === "In Progress") return 'status-inprogress';
    return 'status-notstarted';
  }

  function renderModuleNav() {
    moduleNav.innerHTML = modulesData.map(module => {
      const completedTasks = module.tasks.filter(t => t.completed).length;
      const totalTasks = module.tasks.length;
      let statusIndicator = '';
      if (module.status === "Completed!") {
        statusIndicator = '<span class="ml-auto text-xs text-green-600">✓</span>';
      } else if (module.status === "In Progress" && totalTasks > 0) {
        statusIndicator = `<span class="ml-auto text-xs text-yellow-600">${completedTasks}/${totalTasks}</span>`;
      }

      return `
                    <a href="#" data-module-id="${module.id}" class="sidebar-item block px-3 py-2.5 rounded-md text-sm font-medium text-gray-700 hover:bg-[#F0F9FF] flex items-center">
                        ${sanitizeHTML(module.title.split(':')[0])} ${statusIndicator}
                    </a>`;
    }).join('');

    document.querySelectorAll('#module-nav a').forEach(link => {
      link.addEventListener('click', (event) => {
        event.preventDefault();
        renderModuleContent(event.currentTarget.dataset.moduleId);
      });
    });
    updateActiveNavItem();
    updateOverallProgress();
  }

  function updateActiveNavItem() {
    document.querySelectorAll('#module-nav a').forEach(link => {
      link.classList.remove('active');
      if (link.dataset.moduleId === currentModuleId) {
        link.classList.add('active');
      }
    });
  }

  function updateOverallProgress() {
    const completedModules = modulesData.filter(m => m.status === "Completed!").length;
    const totalModules = modulesData.length;
    const overallProgressTextEl = document.getElementById('overall-progress-text');
    const overallProgressBarEl = document.getElementById('overall-progress-bar');

    if (overallProgressTextEl) {
      overallProgressTextEl.textContent = `${completedModules}/${totalModules} Modules Completed`;
    }
    if (overallProgressBarEl) {
      const percentage = totalModules > 0 ? (completedModules / totalModules) * 100 : 0;
      overallProgressBarEl.style.width = `${percentage}%`;
    }
  }

  function initializeApp() {
    modulesData.forEach(module => { // Initial status calculation for all modules
      const completedTasks = module.tasks.filter(t => t.completed).length;
      const totalTasks = module.tasks.length;
      if (module.id === 'module0' && module.status === "Completed!") {
        // Already set
      } else if (totalTasks === 0) {
        module.status = "Not Started";
      } else if (completedTasks === totalTasks) {
        module.status = "Completed!";
      } else if (completedTasks > 0) {
        module.status = "In Progress";
      } else {
        module.status = "Not Started";
      }
    });
    renderModuleNav();
    if (modulesData.length > 0 && !currentModuleId) {
      // No action, keep welcome screen until user clicks
    }
  }

  initializeApp();
</script>
